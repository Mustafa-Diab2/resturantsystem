version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: servex_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: servex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: servex_backend
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=servex
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=servex_super_secret_key_123
      - JWT_REFRESH_SECRET=servex_super_refresh_key_456
      - CLIENT_URL=http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: servex_frontend
    ports:
      - "80:80"
      - "3000:80" # Map 3000 to Nginx 80
    depends_on:
      - backend

volumes:
  pgdata:
